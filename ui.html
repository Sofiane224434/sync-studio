<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sync Studio</title>
  <style>
    :root {
      --bg: #f7f7f2;
      --panel: #ffffff;
      --ink: #1f1f1a;
      --line: #d8d8cb;
      --accent: #0f766e;
      --accent-2: #115e59;
      --danger: #b91c1c;
      --soft: #eaf7f5;
      --shadow: 0 16px 38px rgba(24, 24, 20, 0.12);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: "Segoe UI", "Trebuchet MS", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 10% 20%, #d8faee 0%, transparent 34%),
        radial-gradient(circle at 92% 10%, #fdf3c7 0%, transparent 30%),
        var(--bg);
      padding: 20px;
    }

    .app {
      max-width: 1100px;
      margin: 0 auto;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .head {
      padding: 18px 24px;
      background: linear-gradient(130deg, #0f766e, #14b8a6);
      color: #ecfffb;
    }

    .head h1 { font-size: 24px; }
    .head p { margin-top: 5px; opacity: 0.9; font-size: 14px; }

    .layout {
      display: grid;
      grid-template-columns: 240px 1fr;
      min-height: 480px;
    }

    /* Sidebar projets */
    .sidebar {
      border-right: 1px solid var(--line);
      padding: 14px 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      background: #fafaf6;
    }

    .sidebar-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #888;
      margin-bottom: 6px;
      padding: 0 4px;
    }

    .proj-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 10px;
      border-radius: 9px;
      cursor: pointer;
      border: none;
      background: transparent;
      text-align: left;
      font-size: 14px;
      color: var(--ink);
      width: 100%;
      transition: background 0.12s;
    }

    .proj-btn:hover { background: #eef7f5; }

    .proj-btn.active {
      background: var(--soft);
      color: var(--accent-2);
      font-weight: 700;
    }

    .proj-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--line);
      flex-shrink: 0;
    }

    .proj-btn.active .proj-dot { background: var(--accent); }
    .proj-btn.current-dot .proj-dot { background: #f59e0b; }

    .proj-label {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .badge-current {
      font-size: 10px;
      background: #fef3c7;
      color: #92400e;
      padding: 1px 5px;
      border-radius: 4px;
      flex-shrink: 0;
    }

    /* Main */
    .main { padding: 18px 20px 22px; display: flex; flex-direction: column; gap: 12px; }

    .no-project {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #888;
      font-size: 15px;
    }

    .bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .bar input {
      flex: 1;
      min-width: 160px;
      padding: 9px 11px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fffdf8;
      font-size: 14px;
    }

    .bar input:focus { outline: none; border-color: var(--accent); }

    .btn {
      border: 0;
      border-radius: 10px;
      padding: 9px 14px;
      font-weight: 700;
      cursor: pointer;
      font-size: 14px;
    }

    .btn-main { background: var(--accent); color: #fff; }
    .btn-main:hover { background: var(--accent-2); }
    .btn-soft { background: var(--soft); color: #14504b; }
    .btn-soft:hover { background: #d4eeeb; }
    .btn-danger { background: #fff1f1; color: var(--danger); }
    .btn-danger:hover { background: #fee2e2; }

    #list {
      border: 1px solid var(--line);
      border-radius: 12px;
      max-height: 420px;
      overflow-y: auto;
      background: #fff;
    }

    .item {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 10px;
      align-items: center;
      padding: 8px 12px;
      border-bottom: 1px solid #f1f1e6;
      cursor: pointer;
      font-size: 13px;
    }

    .item:last-child { border-bottom: 0; }
    .item:hover { background: #fafdfc; }
    .item input[type="checkbox"] { cursor: pointer; width: 15px; height: 15px; accent-color: var(--accent); }

    #status { min-height: 18px; font-size: 13px; font-weight: 600; color: #666; }
    #status.ok { color: #166534; }
    #status.err { color: var(--danger); }

    .section-title {
      font-size: 13px;
      font-weight: 700;
      color: #555;
      margin-bottom: -4px;
    }

    @media (max-width: 700px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { border-right: none; border-bottom: 1px solid var(--line); }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="head">
      <h1>Sync Studio</h1>
      <p>Sélectionne un projet, coche les fichiers à synchroniser avec tous les autres projets connectés.</p>
    </header>

    <div class="layout">
      <nav class="sidebar">
        <div class="sidebar-title">Projets connectés</div>
        <div id="proj-list"></div>
      </nav>

      <section class="main">
        <div id="no-project" class="no-project">← Sélectionne un projet</div>
        <div id="file-section" style="display:none; gap:12px; flex-direction:column;">
          <div class="section-title" id="active-title"></div>
          <div class="bar">
            <input id="search" placeholder="Filtrer les fichiers..." />
            <button id="checkAll" class="btn btn-soft" type="button">Tout cocher</button>
            <button id="uncheckAll" class="btn btn-soft" type="button">Tout décocher</button>
            <button id="save" class="btn btn-main" type="button">Enregistrer</button>
          </div>
          <div id="list"></div>
          <div id="status"></div>
        </div>
        <div style="margin-top:auto; display:flex; justify-content:flex-end; padding-top:8px;">
          <button id="close" class="btn btn-danger" type="button">Fermer l'app</button>
        </div>
      </section>
    </div>
  </main>

  <script>
    const projListEl = document.getElementById("proj-list");
    const noProjectEl = document.getElementById("no-project");
    const fileSectionEl = document.getElementById("file-section");
    const activeTitleEl = document.getElementById("active-title");
    const searchEl = document.getElementById("search");
    const listEl = document.getElementById("list");
    const checkAllEl = document.getElementById("checkAll");
    const uncheckAllEl = document.getElementById("uncheckAll");
    const saveEl = document.getElementById("save");
    const closeEl = document.getElementById("close");
    const statusEl = document.getElementById("status");

    let projects = [];
    let currentProject = "";
    let activeProjectPath = "";
    let files = [];
    let selected = new Set();

    function setStatus(msg, type = "") {
      statusEl.textContent = msg || "";
      statusEl.className = type;
    }

    function filteredFiles() {
      const q = searchEl.value.trim().toLowerCase();
      return q ? files.filter((f) => f.toLowerCase().includes(q)) : files;
    }

    function renderList() {
      const visible = filteredFiles();
      listEl.innerHTML = "";
      for (const file of visible) {
        const row = document.createElement("label");
        row.className = "item";
        const box = document.createElement("input");
        box.type = "checkbox";
        box.checked = selected.has(file);
        box.addEventListener("change", () => {
          if (box.checked) selected.add(file);
          else selected.delete(file);
          setStatus(`${selected.size} fichier(s) sélectionné(s).`);
        });
        const span = document.createElement("span");
        span.textContent = file;
        row.appendChild(box);
        row.appendChild(span);
        listEl.appendChild(row);
      }
      setStatus(`${selected.size} fichier(s) sélectionné(s).`);
    }

    function renderProjects() {
      projListEl.innerHTML = "";
      for (const p of projects) {
        const btn = document.createElement("button");
        btn.className = "proj-btn" + (p.path === currentProject ? " current-dot" : "");
        if (p.path === activeProjectPath) btn.classList.add("active");

        const dot = document.createElement("span");
        dot.className = "proj-dot";

        const label = document.createElement("span");
        label.className = "proj-label";
        label.textContent = p.name;

        btn.appendChild(dot);
        btn.appendChild(label);

        if (p.path === currentProject) {
          const badge = document.createElement("span");
          badge.className = "badge-current";
          badge.textContent = "ici";
          btn.appendChild(badge);
        }

        btn.addEventListener("click", () => selectProject(p.path, p.name));
        projListEl.appendChild(btn);
      }
    }

    async function selectProject(projectPath, name) {
      activeProjectPath = projectPath;
      renderProjects();
      noProjectEl.style.display = "none";
      fileSectionEl.style.display = "flex";
      activeTitleEl.textContent = `Fichiers de ${name}`;
      setStatus("Chargement...");

      try {
        const [stateRes, filesRes] = await Promise.all([
          fetch(`/api/state?projectPath=${encodeURIComponent(projectPath)}`),
          fetch(`/api/files?projectPath=${encodeURIComponent(projectPath)}`),
        ]);
        const state = await stateRes.json();
        const filesData = await filesRes.json();
        files = filesData.files || [];
        selected = new Set(state.selectedFiles || []);
        searchEl.value = "";
        renderList();
      } catch (e) {
        setStatus(e.message || "Erreur", "err");
      }
    }

    async function loadProjects() {
      try {
        const res = await fetch("/api/projects");
        const data = await res.json();
        projects = data.projects || [];
        currentProject = data.currentProject || "";
        renderProjects();

        if (currentProject && projects.find((p) => p.path === currentProject)) {
          const p = projects.find((p) => p.path === currentProject);
          await selectProject(p.path, p.name);
        } else if (projects.length > 0) {
          await selectProject(projects[0].path, projects[0].name);
        }
      } catch (e) {
        setStatus(e.message || "Erreur chargement", "err");
      }
    }

    searchEl.addEventListener("input", renderList);

    checkAllEl.addEventListener("click", () => {
      filteredFiles().forEach((f) => selected.add(f));
      renderList();
    });

    uncheckAllEl.addEventListener("click", () => {
      filteredFiles().forEach((f) => selected.delete(f));
      renderList();
    });

    saveEl.addEventListener("click", async () => {
      if (!activeProjectPath) { setStatus("Sélectionne un projet", "err"); return; }
      const chosen = [...selected];
      if (!chosen.length) { setStatus("Coche au moins un fichier", "err"); return; }
      setStatus("Enregistrement...");
      try {
        const res = await fetch("/api/save", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ projectPath: activeProjectPath, files: chosen }),
        });
        const data = await res.json();
        if (!res.ok || !data.ok) { setStatus(data.error || "Erreur", "err"); return; }
        setStatus(`✓ Configuration enregistrée pour ${projects.find((p) => p.path === activeProjectPath)?.name}`, "ok");
      } catch (e) {
        setStatus(e.message || "Erreur", "err");
      }
    });

    closeEl.addEventListener("click", async () => {
      try { await fetch("/api/close", { method: "POST" }); } catch (_) {}
      setStatus("Fermeture...", "ok");
      setTimeout(() => window.close(), 200);
    });

    loadProjects();
  </script>
</body>
</html>
